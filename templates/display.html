{% extends "base.html" %}
{% block content %}
    <h1>All Tasks</h1>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Student</th>
                <th>Title</th>
                <th>Description</th>
                <th>Criterion</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.datetime }}</td>
                <td>{{ task.student_name }}</td>
                <td>{{ task.title }}</td>
                <td>{{ task.description }}</td>
                <td>{{ task.criterion }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{{ url_for('input_task') }}">Add a new task</a></p>
{% endblock %}
